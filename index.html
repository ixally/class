<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XII TKR 3</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}

body{
background:#0a0a0a;
color:#fff;
transition:.3s;
}

body.light{
background:#f2f2f2;
color:#111;
}

.hero{
padding:70px 20px;
text-align:center;
background:linear-gradient(180deg,#161616,#0a0a0a);
}

body.light .hero{
background:linear-gradient(180deg,#ffffff,#eaeaea);
}

.hero h1{
font-size:38px;
}

.hero p{
opacity:.6;
margin-top:10px;
}

.toggle{
position:fixed;
top:15px;
right:15px;
padding:10px 14px;
border:none;
border-radius:10px;
cursor:pointer;
background:#222;
color:#fff;
}

body.light .toggle{
background:#ddd;
color:#111;
}

.wrap{
max-width:1000px;
margin:auto;
padding:20px;
}

.stats{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
margin-top:-40px;
}

.card{
background:#151515;
padding:18px;
border-radius:14px;
text-align:center;
border:1px solid rgba(255,255,255,0.06);
transition:.3s;
}

body.light .card{
background:#fff;
border:1px solid #ddd;
}

.card:hover{
transform:translateY(-5px);
}

.section{
margin-top:35px;
}

h2{
margin-bottom:10px;
font-size:18px;
}

.teacher{
padding:18px;
border-radius:14px;
background:#151515;
border:1px solid rgba(255,255,255,0.06);
}

body.light .teacher{
background:#fff;
border:1px solid #ddd;
}

.search{
width:100%;
padding:12px;
border-radius:10px;
border:none;
margin-top:10px;
background:#1c1c1c;
color:#fff;
}

body.light .search{
background:#fff;
color:#111;
border:1px solid #ddd;
}

.list{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
gap:10px;
margin-top:15px;
}

.item{
padding:14px;
border-radius:12px;
background:#141414;
cursor:pointer;
transition:.2s;
opacity:0;
transform:translateY(30px);
}

body.light .item{
background:#fff;
border:1px solid #ddd;
}

.item:hover{
transform:scale(1.05);
}

.reveal.active{
opacity:1;
transform:translateY(0);
transition:.6s ease;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.7);
display:none;
justify-content:center;
align-items:center;
}

.modal-box{
background:#1a1a1a;
padding:20px;
border-radius:14px;
width:250px;
text-align:center;
}

body.light .modal-box{
background:#fff;
color:#111;
}

</style>
</head>

<body>

<button class="toggle" onclick="toggleMode()">mode</button>

<div class="hero">
<h1>XII TKR 3</h1>
<p>KELAS GACOR WOKKKKK</p>
</div>

<div class="wrap">

<div class="stats">
<div class="card reveal">Siswa<br><b>32</b></div>
<div class="card reveal">Guru<br><b>5</b></div>
<div class="card reveal">Prestasi<br><b>8</b></div>
</div>

<div class="section reveal">
<h2>Wali Kelas</h2>
<div class="teacher">Ibu Tessa</div>
</div>

<div class="section">
<h2>Cari Siswa</h2>
<input class="search" id="search" onkeyup="cari()" placeholder="ketik nama...">

<div class="list">

<div class="item reveal" onclick="openModal('Asep')">Asep</div>
<div class="item reveal" onclick="openModal('Budi')">Budi</div>
<div class="item reveal" onclick="openModal('Rizky')">Rizky</div>
<div class="item reveal" onclick="openModal('Dimas')">Dimas</div>
<div class="item reveal" onclick="openModal('Fajar')">Fajar</div>

</div>
</div>

</div>

<div class="modal" id="modal">
<div class="modal-box">
<p id="nama"></p>
<br>
<button onclick="closeModal()">close</button>
</div>
</div>

<script>
function cari(){
let input=document.getElementById("search").value.toLowerCase();
document.querySelectorAll(".item").forEach(i=>{
i.style.display=i.innerText.toLowerCase().includes(input)?"block":"none";
});
}

function reveal(){
document.querySelectorAll(".reveal").forEach(el=>{
let top=el.getBoundingClientRect().top;
if(top<window.innerHeight-80){
el.classList.add("active");
}
});
}

window.addEventListener("scroll",reveal);
reveal();

function openModal(nama){
document.getElementById("modal").style.display="flex";
document.getElementById("nama").innerText=nama;
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

function toggleMode(){
document.body.classList.toggle("light");
}
</script>

</body>
</html>
