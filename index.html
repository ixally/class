<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kelas Kita</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background: radial-gradient(circle at top,#1a1a1a,#0b0b0b);
color:#fff;
min-height:100vh;
overflow-x:hidden;
}

header{
text-align:center;
padding:60px 20px 30px;
animation:fadeDown 1s ease;
}

header h1{
font-size:34px;
font-weight:600;
}

header p{
opacity:0.6;
margin-top:8px;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:18px;
padding:20px;
max-width:1000px;
margin:auto;
}

.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.08);
border-radius:16px;
overflow:hidden;
text-align:center;
transition:0.3s;
opacity:0;
transform:translateY(20px);
animation:fadeUp 0.8s ease forwards;
}

.card:nth-child(1){animation-delay:0.2s}
.card:nth-child(2){animation-delay:0.4s}
.card:nth-child(3){animation-delay:0.6s}

.card:hover{
transform:translateY(-8px) scale(1.03);
box-shadow:0 0 20px rgba(255,255,255,0.15);
}

.card img{
width:100%;
height:160px;
object-fit:cover;
transition:0.3s;
}

.card:hover img{
transform:scale(1.1);
filter:brightness(1.2);
}

.card h3{
margin-top:10px;
font-size:16px;
}

.card p{
font-size:12px;
opacity:0.6;
padding-bottom:12px;
}

footer{
text-align:center;
padding:30px;
opacity:0.4;
font-size:12px;
animation:fadeUp 1.2s ease;
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@keyframes fadeDown{
from{
opacity:0;
transform:translateY(-30px);
}
to{
opacity:1;
transform:translateY(0);
}
}
</style>
</head>

<body>

<header>
<h1>Kelas XII TKR 3</h1>
<p>kelas kita, santai aja</p>
</header>

<div class="container">

<div class="card">
<img src="https://i.pravatar.cc/300?img=1">
<h3>Nama 1</h3>
<p>anak kelas</p>
</div>

<div class="card">
<img src="https://i.pravatar.cc/300?img=2">
<h3>Nama 2</h3>
<p>anak kelas</p>
</div>

<div class="card">
<img src="https://i.pravatar.cc/300?img=3">
<h3>Nama 3</h3>
<p>anak kelas</p>
</div>

</div>

<footer>
kelas website simple
</footer>

</body>
</html>
