<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XII TKR 3</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins}

body{
background:#0a0a0a;
color:#fff;
}

.hero{
text-align:center;
padding:60px 20px;
background:linear-gradient(180deg,#161616,#0a0a0a);
}

.hero h1{font-size:36px}
.hero p{opacity:.6;margin-top:8px}

.wrap{
max-width:1000px;
margin:auto;
padding:20px;
}

.search{
width:100%;
padding:12px;
border-radius:10px;
border:none;
outline:none;
background:#1c1c1c;
color:#fff;
margin-top:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(110px,1fr));
gap:15px;
margin-top:20px;
}

.profile{
text-align:center;
cursor:pointer;
transition:.2s;
}

.avatar{
width:70px;
height:70px;
border-radius:50%;
background:#222;
display:flex;
align-items:center;
justify-content:center;
margin:auto;
font-weight:600;
font-size:20px;
border:1px solid rgba(255,255,255,0.08);
overflow:hidden;
transition:.2s;
}

.profile:hover .avatar{
transform:scale(1.1);
}

.name{
margin-top:8px;
font-size:12px;
opacity:.9;
}

.hidden{display:none}
</style>
</head>

<body>

<div class="hero">
<h1>XII TKR 3</h1>
<p>kelas santai tapi gas kalau praktik</p>
</div>

<div class="wrap">

<input class="search" id="search" onkeyup="cari()" placeholder="cari nama...">

<div class="grid">

<div class="profile" data-name="ADHITYA PUTRA PRAYOGA">
<div class="avatar">A</div><div class="name">ADHITYA</div>
</div>

<div class="profile" data-name="AGUNG PRASETYO">
<div class="avatar">A</div><div class="name">AGUNG</div>
</div>

<div class="profile" data-name="AHMAD AGUS KURNIANTO">
<div class="avatar">A</div><div class="name">AHMAD</div>
</div>

<div class="profile" data-name="AHMAD MURTANDHO">
<div class="avatar">A</div><div class="name">MURTANDHO</div>
</div>

<div class="profile" data-name="AHMAD RUDI">
<div class="avatar">A</div><div class="name">RUDI</div>
</div>

<div class="profile" data-name="AIEDA APRILIA NADYAH PUSPITASARI">
<div class="avatar">A</div><div class="name">AIEDA</div>
</div>

<div class="profile" data-name="AJI DWI PRASETYO">
<div class="avatar">A</div><div class="name">AJI</div>
</div>

<div class="profile" data-name="ALFIAN FAHRI ANDRIYANTO PRADANA">
<div class="avatar">A</div><div class="name">ALFIAN</div>
</div>

<div class="profile" data-name="ARDIANSYAH">
<div class="avatar">A</div><div class="name">ARDIANSYAH</div>
</div>

<div class="profile" data-name="ARYA MUNTAHIR">
<div class="avatar">A</div><div class="name">ARYA</div>
</div>

<div class="profile" data-name="BAMBANG HARI MUKTI">
<div class="avatar">B</div><div class="name">BAMBANG</div>
</div>

<div class="profile" data-name="DZAKWAN ZULVAKAR">
<div class="avatar">D</div><div class="name">DZAKWAN</div>
</div>

<div class="profile" data-name="HABIB AZWA RAHADIAN">
<div class="avatar">H</div><div class="name">HABIB</div>
</div>

<div class="profile" data-name="HAFIZH SAJIDAH RAMADHAN">
<div class="avatar">H</div><div class="name">HAFIZH</div>
</div>

<div class="profile" data-name="MUHAMMAD FAREAL JUHANA">
<div class="avatar">M</div><div class="name">FAREAL</div>
</div>

<div class="profile" data-name="MUHAMMAD FATTAN SYAFIEQ">
<div class="avatar">M</div><div class="name">FATTAN</div>
</div>

<div class="profile" data-name="MUHAMMAD RAFFI AR RASYID">
<div class="avatar">M</div><div class="name">RAFFI</div>
</div>

<div class="profile" data-name="YOGA PERMANA">
<div class="avatar">Y</div><div class="name">YOGA</div>
</div>

</div>
</div>

<script>
function cari(){
let val=document.getElementById("search").value.toLowerCase();
document.querySelectorAll(".profile").forEach(p=>{
let name=p.getAttribute("data-name").toLowerCase();
p.style.display=name.includes(val)?"block":"none";
});
}
</script>

</body>
</html>
